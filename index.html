<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Simple Calculator</h1>
    <section id="calc-section">
        <label for="first-number">First Number:</label>
        <input type="number" id="first-number" required>
        <label for="second-number">Second Number:</label>
        <input type="number" id="second-number" required>
        <button type="button" id="operation-btn" data-operation="add">+</button>
        <button type="button" id="operation-btn" data-operation="subtract">-</button>
        <button type="button" id="operation-btn" data-operation="multiply">*</button>
        <button type="button" id="operation-btn" data-operation="divide">/</button>
        <button type="button" id="clear-input">Clear Inputs</button>
    </section>
    <div id="result-container">

    </div>
    <div id="history-container">
        <h3>History</h3>
        <button type="button" id="clear-history">Clear History</button>
        <ul id="history-list">
            
        </ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
